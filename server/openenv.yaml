name: email-triage-openenv
title: Real-World Email Triage Environment
version: 2.1.0
description: >
  A deterministic OpenEnv environment for enterprise inbox triage. Agents must process
  business emails with realistic priorities, spam risk, and follow-up needs.

tags:
  - openenv
  - email-triage
  - customer-support
  - workflow-automation

authors:
  - name: Hackathon Team

license: MIT

environment:
  entrypoint: main.py
  framework: fastapi
  deterministic: true
  max_episode_steps:
    easy: 14
    medium: 22
    hard: 30

api:
  base_url: http://localhost:8000
  endpoints:
    reset:
      method: POST
      path: /reset
      body:
        task: easy|medium|hard
      returns: observation,state
    step:
      method: POST
      path: /step
      body:
        action: read|archive|delete|flag|move_to_folder|mark_spam
        email_id: string
        details: object
      returns: observation,reward,done,info,state
    state:
      method: GET
      path: /state
      returns: environment_state
    grade:
      method: GET
      path: /grade
      returns: task_score_strictly_in_open_interval_0_to_1
    tasks:
      method: GET
      path: /tasks
      returns: available_tasks

models:
  action:
    type: object
    fields:
      action: enum(read, archive, delete, flag, move_to_folder, mark_spam)
      email_id: string
      details: object
  observation:
    type: object
    fields:
      task: object(id, name, description, difficulty, max_steps)
      inbox_count: integer
      unread_count: integer
      current_email: object|null
      email_list: array
      action_taken: string|null
      message: string
  reward:
    type: object
    fields:
      score: float(-1.0, 1.0)
      reason: string
      progress: float(0.0, 1.0)
      cumulative_score: float(0.0, 1.0)

action_space:
  type: discrete
  actions: [read, archive, delete, flag, move_to_folder, mark_spam]

observation_space:
  type: structured
  notes: >
    Agent sees full inbox metadata plus one active email for incremental triage.

reward_function:
  shaped: true
  step_rewards:
    exact_correct: 1.0
    partial_safe_handling: 0.35
    incorrect: -0.10
    invalid_or_repeat: -0.25
  progress_signal: processed_count / total_emails
  penalties:
    - repeated actions on already processed email
    - invalid email IDs
    - inefficient looping via max-step cutoff

tasks:
  easy:
    name: Basic Email Management
    difficulty: easy
    objective: Correctly triage 5 mixed-priority emails.
    grader:
      deterministic: true
      score_range: (0.0, 1.0)
      notes: "STRICT OPEN INTERVAL - Score must be strictly between 0.0 and 1.0 (excluding endpoints)"
      formula: 0.85*accuracy + 0.15*completion
  medium:
    name: Smart Email Organization
    difficulty: medium
    objective: Triage 8 emails including phishing/spam discrimination.
    grader:
      deterministic: true
      score_range: (0.0, 1.0)
      notes: "STRICT OPEN INTERVAL - Score must be strictly between 0.0 and 1.0 (excluding endpoints)"
      formula: 0.65*accuracy + 0.25*spam_precision + 0.10*completion
  hard:
    name: Executive Inbox Prioritization
    difficulty: hard
    objective: Triage 10 emails with high-risk prioritization and efficiency.
    grader:
      deterministic: true
      score_range: (0.0, 1.0)
      notes: "STRICT OPEN INTERVAL - Score must be strictly between 0.0 and 1.0 (excluding endpoints)"
      formula: 0.55*accuracy + 0.35*high_priority_recall + 0.10*completion - efficiency_penalty

baselines:
  reproducible_script: ../inference.py
  notes: >
    Baseline script uses OpenAI client with API_BASE_URL, MODEL_NAME, API_KEY,
    and fixed decoding parameters for deterministic behavior.
    All scores are guaranteed to stay strictly within (0.0, 1.0) open interval.

deployment:
  target: huggingface-spaces
  sdk: docker
  dockerfile: ../Dockerfile
